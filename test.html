<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Test Runner – Election Education Assistant</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body {
            font-family: 'Inter', sans-serif;
            background: #0f172a;
            color: #e2e8f0;
            padding: 2rem;
            min-height: 100vh;
        }
        header {
            display: flex;
            align-items: center;
            gap: 1rem;
            margin-bottom: 2rem;
            border-bottom: 1px solid #1e293b;
            padding-bottom: 1.5rem;
        }
        header h1 { font-size: 1.5rem; font-weight: 700; color: #f8fafc; }
        header span { font-size: 0.9rem; color: #64748b; }
        .summary {
            border-radius: 12px;
            padding: 1.5rem 2rem;
            margin-bottom: 2rem;
            border: 1px solid transparent;
        }
        .summary.all-pass {
            background: rgba(34,197,94,0.1);
            border-color: #16a34a;
        }
        .summary.has-fail {
            background: rgba(239,68,68,0.1);
            border-color: #dc2626;
        }
        .summary h2 { font-size: 1.25rem; margin-bottom: 0.5rem; }
        .summary p  { font-size: 0.95rem; color: #94a3b8; }
        .summary strong { color: #f8fafc; }
        table {
            width: 100%;
            border-collapse: collapse;
            background: #1e293b;
            border-radius: 12px;
            overflow: hidden;
        }
        th {
            background: #334155;
            padding: 0.75rem 1rem;
            text-align: left;
            font-size: 0.8rem;
            text-transform: uppercase;
            letter-spacing: 0.05em;
            color: #94a3b8;
        }
        td {
            padding: 0.65rem 1rem;
            font-size: 0.9rem;
            border-top: 1px solid #334155;
        }
        tr.pass td:first-child { color: #4ade80; }
        tr.fail td:first-child { color: #f87171; }
        tr.fail { background: rgba(239,68,68,0.05); }
        tr:hover { background: rgba(255,255,255,0.03); }
        #loading {
            text-align: center;
            padding: 3rem;
            color: #64748b;
            font-size: 1rem;
            animation: pulse 1.5s infinite;
        }
        @keyframes pulse { 0%,100%{opacity:1} 50%{opacity:0.4} }
    </style>
</head>
<body>
    <header>
        <span style="font-size:2rem;">🗳️</span>
        <div>
            <h1>Election Education Assistant — Test Suite</h1>
            <span>Vanilla JS • No build step required • Open in any modern browser</span>
        </div>
    </header>

    <div id="test-results">
        <div id="loading">⏳ Loading app and running tests…</div>
    </div>

    <!-- Load the real app so DOM-dependent tests use live functions -->
    <script src="app.js"></script>
    <!-- Load and run the test suite -->
    <script src="tests.js"></script>
</body>
</html>
